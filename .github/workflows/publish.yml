name: Build & Publish carton

on:
  push:
    tags:
      - 'v*'
      - 'beta*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer (e.g. 1.2.3 or 1.2.3-beta.1)'
        required: true
        type: string
      channel:
        description: 'Release train to publish'
        required: true
        type: choice
        default: release
        options:
          - release
          - beta
      tag:
        description: 'Optional tag to create (defaults to v<version>-<channel> for manual runs)'
        required: false
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip
  APP_NAME: ${{ github.event.repository.name }}

jobs:
  metadata:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          channel="release"
          tag=""
          version=""
          ref_name="${{ github.ref_name }}"

          if [[ "$event" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            channel="${{ inputs.channel }}"
            tag="${{ inputs.tag }}"
            if [[ -z "$tag" ]]; then
              tag="v${version}-${channel}"
            fi
          else
            tag="$ref_name"
            if [[ "$ref_name" == v* ]]; then
              version="${ref_name#v}"
            else
              version="$ref_name"
            fi

            shopt -s nocasematch
            if [[ "$ref_name" == beta* ]] || [[ "$ref_name" == *-beta* ]] || [[ "$ref_name" == *-rc* ]] || [[ "$ref_name" == *-preview* ]]; then
              channel="beta"
            fi
            shopt -u nocasematch
          fi

          if [[ -z "$version" ]]; then
            echo "Version could not be resolved. Provide inputs.version when running manually." >&2
            exit 1
          fi

          if [[ "$channel" != "beta" ]]; then
            channel="release"
          fi

          is_prerelease="false"
          shopt -s nocasematch
          if [[ "$channel" == "beta" ]] || [[ "$version" == *-beta* ]] || [[ "$version" == *-rc* ]] || [[ "$version" == *-preview* ]]; then
            is_prerelease="true"
          fi
          shopt -u nocasematch

          app_name="${APP_NAME:-carton}"
          release_name="${app_name} ${version}"

          {
            echo "version=${version}"
            echo "channel=${channel}"
            echo "is_prerelease=${is_prerelease}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.rid }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
            portableExt: zip
          - os: windows-latest
            rid: win-arm64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
            portableExt: zip
          - os: ubuntu-22.04
            rid: linux-x64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
            portableExt: tar.gz
          - os: ubuntu-22.04
            rid: linux-arm64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
            portableExt: tar.gz
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      CHANNEL: ${{ needs.metadata.outputs.channel }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-dev-arm64-cross zlib1g-dev libkrb5-dev pkg-config

      - name: Install Velopack CLI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Velopack CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.rid }}"
          mkdir -p "$publish_dir"
          props=(
            -c Release
            -r ${{ matrix.rid }}
            -o "$publish_dir"
            /p:PublishAot=true
            /p:SelfContained=true
            /p:StripSymbols=true
            /p:DebugSymbols=false
            /p:DebugType=None
            /p:InvariantGlobalization=true
            /p:IncludeNativeLibrariesForSelfExtract=true
            /p:EnableCompressionInSingleFile=true
          )
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            props+=(/p:ObjCopyName=aarch64-linux-gnu-objcopy)
          fi
          dotnet publish src/carton.GUI/carton.GUI.csproj "${props[@]}"
          echo "PUBLISH_DIR=$publish_dir" >> "$GITHUB_ENV"

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $publishDir = "$env:GITHUB_WORKSPACE\artifacts\publish\${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          dotnet publish src\carton.GUI\carton.GUI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -o $publishDir `
            /p:PublishAot=true `
            /p:SelfContained=true `
            /p:StripSymbols=true `
            /p:DebugSymbols=false `
            /p:DebugType=None `
            /p:InvariantGlobalization=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true
          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create portable archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pack_dir="$GITHUB_WORKSPACE/artifacts/pack/${{ matrix.rid }}-$CHANNEL"
          mkdir -p "$pack_dir"
          find "$PUBLISH_DIR" -name '*.pdb' -delete
          portable_name="${APP_NAME}-${VERSION}-${{ matrix.rid }}-portable.tar.gz"
          tar -C "$PUBLISH_DIR" -czf "$pack_dir/$portable_name" .
          echo "PACK_DIR=$pack_dir" >> "$GITHUB_ENV"

      - name: Create portable archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packDir = "$env:GITHUB_WORKSPACE\artifacts\pack\${{ matrix.rid }}-$env:CHANNEL"
          New-Item -ItemType Directory -Path $packDir -Force | Out-Null
          Get-ChildItem -Path $env:PUBLISH_DIR -Filter '*.pdb' -Recurse | Remove-Item -Force
          $portableName = "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}-portable.zip"
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath "$packDir\$portableName" -Force
          "PACK_DIR=$packDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package with Velopack (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          icon_path=$(realpath '${{ matrix.icon }}')
          vpk pack \
            --packId "$APP_NAME" \
            --packVersion "$VERSION" \
            --channel "$CHANNEL" \
            --runtime ${{ matrix.rid }} \
            --packDir "$PUBLISH_DIR" \
            --mainExe '${{ matrix.mainExe }}' \
            --packTitle "$APP_NAME" \
            --icon "$icon_path" \
            --outputDir "$PACK_DIR"
          echo "$CHANNEL" > "$PACK_DIR/channel.txt"

      - name: Package with Velopack (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iconPath = (Resolve-Path '${{ matrix.icon }}').Path
          vpk pack `
            --packId "$env:APP_NAME" `
            --packVersion $env:VERSION `
            --channel $env:CHANNEL `
            --runtime ${{ matrix.rid }} `
            --packDir $env:PUBLISH_DIR `
            --mainExe '${{ matrix.mainExe }}' `
            --packTitle "$env:APP_NAME" `
            --icon $iconPath `
            --outputDir $env:PACK_DIR
          Set-Content -Path "$env:PACK_DIR\channel.txt" -Value $env:CHANNEL

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpk-${{ matrix.rid }}-${{ env.CHANNEL }}
          path: ${{ env.PACK_DIR }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Normalize installer filenames
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          app_name="${APP_NAME:-carton}"
          for artifact in dist/vpk-*; do
            [[ -d "$artifact" ]] || continue
            artifact_name=$(basename "$artifact")
            rid=$(echo "$artifact_name" | sed 's/^vpk-//;s/-[^-]*$//')

            while IFS= read -r -d '' setup; do
              base_name=$(basename "$setup")
              target="${app_name}-${VERSION}-${rid}-Setup.exe"
              if [[ "$base_name" == "$target" ]]; then
                continue
              fi
              dest="${setup%/*}/$target"
              cp -f "$setup" "$dest"
            done < <(find "$artifact" -maxdepth 1 -type f -iname '*setup.exe' -print0)

            while IFS= read -r -d '' appimage; do
              base_name=$(basename "$appimage")
              target="${app_name}-${VERSION}-${rid}.AppImage"
              if [[ "$base_name" == "$target" ]]; then
                continue
              fi
              dest="${appimage%/*}/$target"
              cp -f "$appimage" "$dest"
            done < <(find "$artifact" -maxdepth 1 -type f -iname '*.AppImage' -print0)
          done

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack CLI
        shell: bash
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Upload release via Velopack
        shell: bash
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # 按 channel 把各平台的 vpk 文件合并到一个目录
          # 跳过 releases*.json（vpk upload 重新生成）和 portable 压缩包（单独上传）
          # 跳过 channel.txt（辅助文件）
          declare -A merged
          for artifact in dist/*/; do
            artifact="${artifact%/}"
            channel=$(cat "$artifact/channel.txt" 2>/dev/null | tr -d '[:space:]')
            if [[ -z "$channel" ]]; then
              echo "Warning: channel.txt missing in $artifact, skipping." >&2
              continue
            fi
            merged_dir="dist/merged-$channel"
            mkdir -p "$merged_dir"
            find "$artifact" -maxdepth 1 -type f \
              ! -name 'releases*.json' \
              ! -name 'channel.txt' \
              ! -name '*-portable.zip' \
              ! -name '*-portable.tar.gz' \
              -exec cp -n {} "$merged_dir/" \;
            merged[$channel]="$merged_dir"
          done

          if [[ ${#merged[@]} -eq 0 ]]; then
            echo "No packaged artifacts were found." >&2
            exit 1
          fi

          first=1
          for channel in "${!merged[@]}"; do
            merged_dir="${merged[$channel]}"
            flags=(
              upload github
              --repoUrl "$REPO_URL"
              --token "$TOKEN"
              --channel "$channel"
              --outputDir "$merged_dir"
              --tag "$TAG"
              --releaseName "$RELEASE_NAME"
            )
            if [[ "$first" -eq 1 ]]; then
              flags+=(--publish)
              first=0
            else
              flags+=(--merge)
            fi
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              flags+=(--pre)
            fi
            vpk "${flags[@]}"
          done

      - name: Upload portable archives and installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          uploads=()
          app_name="${APP_NAME:-carton}"
          version="${VERSION}"

          # portable 压缩包（文件名已含 rid，可直接上传）
          while IFS= read -r -d '' f; do
            uploads+=("$f")
          done < <(find dist -maxdepth 2 \( -name '*-portable.zip' -o -name '*-portable.tar.gz' \) -print0)

          for artifact in dist/vpk-*; do
            [[ -d "$artifact" ]] || continue
            while IFS= read -r -d '' setup; do
              uploads+=("$setup")
            done < <(find "$artifact" -maxdepth 1 -type f -name "${app_name}-${version}-*-Setup.exe" -print0)

            while IFS= read -r -d '' appimage; do
              uploads+=("$appimage")
            done < <(find "$artifact" -maxdepth 1 -type f -name "${app_name}-${version}-*.AppImage" -print0)
          done

          if [[ ${#uploads[@]} -eq 0 ]]; then
            echo "No files to upload, skipping."
            exit 0
          fi

          gh release upload "$TAG" "${uploads[@]}" --repo "$REPO" --clobber
