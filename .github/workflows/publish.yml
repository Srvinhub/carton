name: Build & Publish carton

on:
  push:
    tags:
      - 'v*'
      - 'beta*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer (e.g. 1.2.3 or 1.2.3-beta.1)'
        required: true
        type: string
      channel:
        description: 'Release train to publish'
        required: true
        type: choice
        default: release
        options:
          - release
          - beta
      tag:
        description: 'Optional tag to create (defaults to v<version>-<channel> for manual runs)'
        required: false
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip
  APP_NAME: carton

jobs:
  metadata:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          channel="release"
          tag=""
          version=""
          ref_name="${{ github.ref_name }}"

          if [[ "$event" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            channel="${{ inputs.channel }}"
            tag="${{ inputs.tag }}"
            if [[ -z "$tag" ]]; then
              tag="v${version}-${channel}"
            fi
          else
            tag="$ref_name"
            if [[ "$ref_name" == v* ]]; then
              version="${ref_name#v}"
            else
              version="$ref_name"
            fi

            shopt -s nocasematch
            if [[ "$ref_name" == beta* ]] || [[ "$ref_name" == *-beta* ]] || [[ "$ref_name" == *-rc* ]] || [[ "$ref_name" == *-preview* ]]; then
              channel="beta"
            fi
            shopt -u nocasematch
          fi

          if [[ -z "$version" ]]; then
            echo "Version could not be resolved. Provide inputs.version when running manually." >&2
            exit 1
          fi

          if [[ "$channel" != "beta" ]]; then
            channel="release"
          fi

          is_prerelease="false"
          shopt -s nocasematch
          if [[ "$channel" == "beta" ]] || [[ "$version" == *-beta* ]] || [[ "$version" == *-rc* ]] || [[ "$version" == *-preview* ]]; then
            is_prerelease="true"
          fi
          shopt -u nocasematch

          app_name="${APP_NAME:-carton}"
          release_name="${app_name} ${version}"

          {
            echo "version=${version}"
            echo "channel=${channel}"
            echo "is_prerelease=${is_prerelease}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.rid }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
          - os: windows-latest
            rid: win-arm64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
          - os: ubuntu-22.04
            rid: linux-x64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
          - os: ubuntu-22.04
            rid: linux-arm64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      CHANNEL: ${{ needs.metadata.outputs.channel }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-dev-arm64-cross zlib1g-dev libkrb5-dev pkg-config

      - name: Install Velopack CLI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Velopack CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.rid }}"
          mkdir -p "$publish_dir"
          props=(
            -c Release
            -r ${{ matrix.rid }}
            -o "$publish_dir"
            /p:PublishAot=true
            /p:SelfContained=true
            /p:StripSymbols=true
            /p:DebugSymbols=false
            /p:DebugType=None
            /p:InvariantGlobalization=true
            /p:IncludeNativeLibrariesForSelfExtract=true
            /p:EnableCompressionInSingleFile=true
          )
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            props+=(/p:ObjCopyName=aarch64-linux-gnu-objcopy)
          fi
          dotnet publish src/carton.GUI/carton.GUI.csproj "${props[@]}"
          echo "PUBLISH_DIR=$publish_dir" >> "$GITHUB_ENV"

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $publishDir = "$env:GITHUB_WORKSPACE\artifacts\publish\${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          dotnet publish src\carton.GUI\carton.GUI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -o $publishDir `
            /p:PublishAot=true `
            /p:SelfContained=true `
            /p:StripSymbols=true `
            /p:DebugSymbols=false `
            /p:DebugType=None `
            /p:InvariantGlobalization=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true
          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create portable archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pack_dir="$GITHUB_WORKSPACE/artifacts/pack/${{ matrix.rid }}-$CHANNEL"
          mkdir -p "$pack_dir"
          find "$PUBLISH_DIR" -name '*.pdb' -delete
          portable_name="${APP_NAME}-${VERSION}-${{ matrix.rid }}-portable.tar.gz"
          tar -C "$PUBLISH_DIR" -czf "$pack_dir/$portable_name" .
          echo "PACK_DIR=$pack_dir" >> "$GITHUB_ENV"

      - name: Create portable archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packDir = "$env:GITHUB_WORKSPACE\artifacts\pack\${{ matrix.rid }}-$env:CHANNEL"
          New-Item -ItemType Directory -Path $packDir -Force | Out-Null
          Get-ChildItem -Path $env:PUBLISH_DIR -Filter '*.pdb' -Recurse | Remove-Item -Force
          $portableName = "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}-portable.zip"
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath "$packDir\$portableName" -Force
          "PACK_DIR=$packDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package with Velopack (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          icon_path=$(realpath '${{ matrix.icon }}')
          package_channel='${{ matrix.rid }}-'$CHANNEL
          vpk pack \
            --packId "$APP_NAME" \
            --packVersion "$VERSION" \
            --channel "$package_channel" \
            --runtime ${{ matrix.rid }} \
            --packDir "$PUBLISH_DIR" \
            --mainExe '${{ matrix.mainExe }}' \
            --packTitle "$APP_NAME" \
            --icon "$icon_path" \
            --outputDir "$PACK_DIR"

      - name: Package with Velopack (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iconPath = (Resolve-Path '${{ matrix.icon }}').Path
          $packageChannel = "${{ matrix.rid }}-$env:CHANNEL"
          vpk pack `
            --packId "$env:APP_NAME" `
            --packVersion $env:VERSION `
            --channel $packageChannel `
            --runtime ${{ matrix.rid }} `
            --packDir $env:PUBLISH_DIR `
            --mainExe '${{ matrix.mainExe }}' `
            --packTitle "$env:APP_NAME" `
            --icon $iconPath `
            --outputDir $env:PACK_DIR

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vpk-${{ matrix.rid }}-${{ env.CHANNEL }}
          path: ${{ env.PACK_DIR }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/release-template.md

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release assets
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          app_name="${APP_NAME:-carton}"
          release_dir="$RUNNER_TEMP/release-assets"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          for artifact in dist/vpk-*; do
            [[ -d "$artifact" ]] || continue
            artifact_name=$(basename "$artifact")
            rid=$(echo "$artifact_name" | sed 's/^vpk-//;s/-[^-]*$//')

            while IFS= read -r -d '' setup; do
              cp -f "$setup" "$release_dir/${app_name}-${VERSION}-${rid}-Setup.exe"
            done < <(find "$artifact" -maxdepth 1 -type f -iname '*setup.exe' -print0)

            while IFS= read -r -d '' appimage; do
              cp -f "$appimage" "$release_dir/${app_name}-${VERSION}-${rid}.AppImage"
            done < <(find "$artifact" -maxdepth 1 -type f -iname '*.AppImage' -print0)

            while IFS= read -r -d '' portable; do
              cp -f "$portable" "$release_dir/$(basename "$portable")"
            done < <(find "$artifact" -maxdepth 1 -type f \( -name '*-portable.zip' -o -name '*-portable.tar.gz' \) -print0)

            while IFS= read -r -d '' nupkg; do
              cp -f "$nupkg" "$release_dir/$(basename "$nupkg")"
            done < <(find "$artifact" -maxdepth 1 -type f -name '*.nupkg' -print0)

            while IFS= read -r -d '' releases_json; do
              cp -f "$releases_json" "$release_dir/$(basename "$releases_json")"
            done < <(find "$artifact" -maxdepth 1 -type f -name 'releases*.json' -print0)
          done

          if ! find "$release_dir" -maxdepth 1 -type f | grep -q .; then
            echo "No release assets were prepared." >&2
            exit 1
          fi

          echo "RELEASE_ASSETS_DIR=$release_dir" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          args=("$TAG" "--repo" "$REPO" "--title" "$RELEASE_NAME")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=("--prerelease")
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "${args[@]}"
          else
            gh release create "${args[@]}" --target "$TARGET_SHA" --notes ""
          fi

      - name: Clear existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/releases/tags/$TAG" --jq '.assets[].id' | while read -r asset_id; do
            [[ -n "$asset_id" ]] || continue
            gh api "repos/$REPO/releases/assets/$asset_id" --method DELETE
          done

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          uploads=()
          for pattern in '*-Setup.exe' '*.AppImage' '*-portable.zip' '*-portable.tar.gz' '*.nupkg' 'releases*.json'; do
            for f in "$RELEASE_ASSETS_DIR"/$pattern; do
              [[ -f "$f" ]] || continue
              uploads+=("$f")
            done
          done

          if [[ ${#uploads[@]} -eq 0 ]]; then
            echo "No files to upload." >&2
            exit 1
          fi

          gh release upload "$TAG" "${uploads[@]}" --repo "$REPO"

      - name: Update release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.metadata.outputs.version }}
          CHANNEL: ${{ needs.metadata.outputs.channel }}
        run: |
          set -euo pipefail

          app_name="${APP_NAME:-carton}"
          base_url="https://github.com/$REPO/releases/download/$TAG"
          notes_file="$RUNNER_TEMP/release-notes.md"
          template_file=".github/release-template.md"

          sed \
            -e "s|__APP_NAME__|$app_name|g" \
            -e "s|__VERSION__|$VERSION|g" \
            -e "s|__TAG__|$TAG|g" \
            -e "s|__REPO__|$REPO|g" \
            -e "s|__BASE_URL__|$base_url|g" \
            -e "s|__CHANNEL__|$CHANNEL|g" \
            "$template_file" > "$notes_file"

          gh release edit "$TAG" --repo "$REPO" --notes-file "$notes_file"
